services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-portal-app
    restart: unless-stopped
    volumes:
      - db-data:/var/www/database
      - app-storage:/var/www/storage
      - app-public:/var/www/public-shared
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - job-portal

  nginx:
    image: nginx:alpine
    container_name: job-portal-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/public:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - job-portal

volumes:
  db-data:
    driver: local
  app-storage:
    driver: local
  app-public:
    driver: local

networks:
  job-portal:
    driver: bridge
